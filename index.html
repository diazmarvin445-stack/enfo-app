<script>
  let D = {
    inicio: { thought: "", notes: "", learn: "" },
    strategies: [],
    diary: [],
    quotes: []
  };

  let cur = null;
  let cf = "all";
  let cr = null;
  let cfcb = null;
  let editingOpId = null;

  function byId(id) {
    return document.getElementById(id);
  }

  function sv() {
    try {
      localStorage.setItem("enfo", JSON.stringify(D));
    } catch (e) {
      console.error("Error guardando:", e);
    }
  }

  function ld() {
    try {
      const r = localStorage.getItem("enfo");
      if (r) D = JSON.parse(r);
    } catch (e) {
      console.error("Error cargando localStorage:", e);
    }

    if (!D || typeof D !== "object") {
      D = {
        inicio: { thought: "", notes: "", learn: "" },
        strategies: [],
        diary: [],
        quotes: []
      };
    }

    D.inicio = D.inicio || { thought: "", notes: "", learn: "" };
    D.strategies = Array.isArray(D.strategies) ? D.strategies : [];
    D.diary = Array.isArray(D.diary) ? D.diary : [];
    D.quotes = Array.isArray(D.quotes) ? D.quotes : [];

    D.strategies.forEach((s) => {
      s.ops = Array.isArray(s.ops) ? s.ops : [];
      s.rules = s.rules || "";
      s.mesa = s.mesa || "";
    });
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  }

  function e(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function nav(id) {
    document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
    document.querySelectorAll(".nb").forEach((b) => b.classList.remove("on"));

    const screen = byId("s-" + id);
    const navBtn = byId("nb-" + id);
    const detail = byId("strat-detail");

    if (screen) screen.classList.add("active");
    if (navBtn) navBtn.classList.add("on");
    if (detail) detail.classList.remove("open");

    if (id === "estrategias") rstrat();
    if (id === "diario") rdiary();
    if (id === "biblioteca") rquotes();
  }

  function setDates() {
    const d = new Date();
    const dn = ["DOMINGO", "LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO"];
    const mn = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
    const mn2 = ["ENERO", "FEBRERO", "MARZO", "ABRIL", "MAYO", "JUNIO", "JULIO", "AGOSTO", "SEPTIEMBRE", "OCTUBRE", "NOVIEMBRE", "DICIEMBRE"];

    const dateLbl = byId("date-lbl");
    const dlbl = byId("dlbl");
    const od = byId("od");

    if (dateLbl) dateLbl.textContent = `${dn[d.getDay()]}, ${d.getDate()} ${mn[d.getMonth()]}`;
    if (dlbl) dlbl.textContent = `${dn[d.getDay()]}, ${d.getDate()} DE ${mn2[d.getMonth()]} DE ${d.getFullYear()}`;
    if (od && !od.value) od.value = d.toISOString().split("T")[0];
  }

  function initI() {
    const thought = byId("thought");
    const notes = byId("notes");
    const learn = byId("learn");

    if (thought) thought.value = D.inicio.thought || "";
    if (notes) notes.value = D.inicio.notes || "";
    if (learn) learn.value = D.inicio.learn || "";

    if (thought) {
      thought.oninput = () => {
        D.inicio.thought = thought.value;
        sv();
      };
    }

    if (notes) {
      notes.oninput = () => {
        D.inicio.notes = notes.value;
        sv();
      };
    }

    if (learn) {
      learn.oninput = () => {
        D.inicio.learn = learn.value;
        sv();
      };
    }
  }

  function rstrat() {
    const l = byId("strat-list");
    if (!l) return;

    if (!D.strategies.length) {
      l.innerHTML = `
        <div class="empty">
          <div class="empty-icon">⊞</div>
          <div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px">
            No tienes estrategias aún.
          </div>
          <div style="font-size:13px">Crea tu primera estrategia abajo.</div>
        </div>
      `;
      return;
    }

    l.innerHTML = D.strategies.map((s, i) => {
      const w = (s.ops || []).filter((o) => o.result === "win").length;
      const t = (s.ops || []).length;

      return `
        <div class="si" style="animation-delay:${i * 0.05}s" onclick="openS('${s.id}')">
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:15px">${e(s.name)}</div>
            <div style="font-size:11px;color:var(--text3);margin-top:3px">
              ${t} operacion${t !== 1 ? "es" : ""}
            </div>
          </div>

          <div style="display:flex;gap:7px;align-items:center;flex-shrink:0">
            ${t ? `<span class="pw">${w}W</span><span class="pl">${t - w}L</span>` : ""}

            <button
              class="btn btn-g btn-sm"
              onclick="event.stopPropagation(); startEditStratFromList('${s.id}')"
              title="Editar"
            >✏️</button>

            <button
              class="btn btn-d btn-sm"
              onclick="event.stopPropagation(); askDelStratById('${s.id}')"
              title="Borrar"
            >🗑</button>

            <span style="color:var(--text3);font-size:22px">›</span>
          </div>
        </div>
      `;
    }).join("");
  }

  function crStrat() {
    const n = (byId("ns-n")?.value || "").trim();
    if (!n) return;

    D.strategies.unshift({
      id: uid(),
      name: n,
      rules: byId("ns-r")?.value || "",
      mesa: "",
      ops: []
    });

    sv();
    closeModal("m-ns");
    if (byId("ns-n")) byId("ns-n").value = "";
    if (byId("ns-r")) byId("ns-r").value = "";
    rstrat();
  }

  function gS() {
    return D.strategies.find((s) => s.id === cur);
  }

  function gSById(id) {
    return D.strategies.find((s) => s.id === id);
  }

  function openS(id) {
    cur = id;
    cf = "all";
    cr = null;
    editingOpId = null;

    const s = gS();
    if (!s) return;

    if (byId("dname")) byId("dname").textContent = s.name;
    if (byId("dname")) byId("dname").style.display = "";
    if (byId("rinp")) byId("rinp").style.display = "none";
    if (byId("st-rules")) byId("st-rules").value = s.rules || "";
    if (byId("st-mesa")) byId("st-mesa").value = s.mesa || "";
    if (byId("df")) byId("df").value = "";
    if (byId("dt")) byId("dt").value = "";

    document.querySelectorAll(".chip").forEach((c, i) => c.classList.toggle("on", i === 0));

    stab("ops");
    rStats();
    renderOps();

    if (byId("strat-detail")) byId("strat-detail").classList.add("open");
  }

  function closeDetail() {
    if (byId("strat-detail")) byId("strat-detail").classList.remove("open");
    rstrat();
  }

  function startRename() {
    const s = gS();
    if (!s) return;

    if (byId("dname")) byId("dname").style.display = "none";
    const i = byId("rinp");
    if (!i) return;

    i.style.display = "block";
    i.value = s.name;
    i.focus();
    i.select();
  }

  function saveRename() {
    const s = gS();
    if (!s) return;

    const input = byId("rinp");
    if (!input) return;

    const v = input.value.trim();
    if (v) {
      s.name = v;
      sv();
      if (byId("dname")) byId("dname").textContent = v;
      rstrat();
    }

    input.style.display = "none";
    if (byId("dname")) byId("dname").style.display = "";
  }

  function startEditStratFromList(id) {
    openS(id);
    setTimeout(() => startRename(), 50);
  }

  function askDelStrat() {
    const s = gS();
    if (!s) return;

    opConf(
      "⚠️",
      "Eliminar estrategia",
      "Se eliminarán la estrategia y todas sus operaciones. No se puede deshacer.",
      () => {
        D.strategies = D.strategies.filter((x) => x.id !== s.id);
        sv();
        closeDetail();
      }
    );
  }

  function askDelStratById(id) {
    const s = gSById(id);
    if (!s) return;

    opConf(
      "⚠️",
      "Eliminar estrategia",
      `Se eliminará "${s.name}" y todas sus operaciones.`,
      () => {
        D.strategies = D.strategies.filter((x) => x.id !== id);
        if (cur === id) cur = null;
        if (byId("strat-detail")) byId("strat-detail").classList.remove("open");
        sv();
        rstrat();
      }
    );
  }

  function svRules() {
    const s = gS();
    if (!s || !byId("st-rules")) return;
    s.rules = byId("st-rules").value;
    sv();
  }

  function svMesa() {
    const s = gS();
    if (!s || !byId("st-mesa")) return;
    s.mesa = byId("st-mesa").value;
    sv();
  }

  function rStats() {
    const s = gS();
    if (!s) return;

    const ops = s.ops || [];
    const t = ops.length;
    const w = ops.filter((o) => o.result === "win").length;
    const l = t - w;
    const pct = t ? Math.round((w / t) * 100) : 0;

    if (byId("srow")) {
      byId("srow").innerHTML = `
        <div class="sbox">
          <div class="sval" style="color:var(--accent2)">${t}</div>
          <div class="slbl">TOTAL</div>
        </div>
        <div class="sbox">
          <div class="sval" style="color:var(--green)">${w}</div>
          <div class="slbl">GANADAS</div>
        </div>
        <div class="sbox">
          <div class="sval" style="color:var(--red)">${l}</div>
          <div class="slbl">PERDIDAS</div>
        </div>
      `;
    }

    if (byId("ww")) byId("ww").textContent = "Ganadas: " + w;
    if (byId("wl")) byId("wl").textContent = "Perdidas: " + l;
    if (byId("wp")) byId("wp").textContent = pct + "%";

    setTimeout(() => {
      if (byId("wf")) byId("wf").style.width = pct + "%";
    }, 80);
  }

  function stab(t) {
    ["ops", "rules", "mesa"].forEach((id) => {
      if (byId("tc-" + id)) byId("tc-" + id).style.display = id === t ? "block" : "none";
      if (byId("t-" + id)) byId("t-" + id).classList.toggle("on", id === t);
    });
  }

  function setF(f, el) {
    cf = f;
    document.querySelectorAll(".chip").forEach((c) => c.classList.remove("on"));
    if (el) el.classList.add("on");
    renderOps();
  }

  function clrDates() {
    if (byId("df")) byId("df").value = "";
    if (byId("dt")) byId("dt").value = "";
    renderOps();
  }

  function renderOps() {
    const s = gS();
    const l = byId("ops-list");
    if (!s || !l) return;

    let ops = [...(s.ops || [])];

    if (cf === "win") ops = ops.filter((o) => o.result === "win");
    else if (cf === "lose") ops = ops.filter((o) => o.result === "lose");
    else if (cf === "call") ops = ops.filter((o) => o.type === "Call");
    else if (cf === "put") ops = ops.filter((o) => o.type === "Put");

    const df = byId("df")?.value || "";
    const dt = byId("dt")?.value || "";

    if (df) ops = ops.filter((o) => o.date >= df);
    if (dt) ops = ops.filter((o) => o.date <= dt);

    if (!ops.length) {
      l.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px">
            Sin operaciones
          </div>
          <div style="font-size:13px">Registra tu primera operación.</div>
        </div>
      `;
      return;
    }

    l.innerHTML = ops.map((op, i) => {
      const resultColor = op.result === "win" ? "var(--green)" : "var(--red)";
      const resultText = op.result === "win" ? "✅ Ganó" : "❌ Perdió";
      const typeClass = op.type === "Call" ? "call" : "put";
      const typeIcon = op.type === "Call" ? "📈" : "📉";

      return `
        <div class="opc" style="animation-delay:${i * 0.04}s">
          <div class="otop">
            <span class="oasset">${e(op.asset)}</span>
            <span class="otype ${typeClass}">${typeIcon} ${e(op.type)}</span>
          </div>

          <div class="ogrid">
            <div>
              <div style="font-size:10px;color:var(--text3);margin-bottom:2px">ENTRADA</div>
              <div style="font-size:13px;font-weight:600">${e(op.entry) || "—"}</div>
            </div>
            <div>
              <div style="font-size:10px;color:var(--text3);margin-bottom:2px">SALIDA</div>
              <div style="font-size:13px;font-weight:600">${e(op.exit) || "—"}</div>
            </div>
            <div>
              <div style="font-size:10px;color:var(--text3);margin-bottom:2px">CONTRATOS</div>
              <div style="font-size:13px;font-weight:600">${e(op.contracts) || "—"}</div>
            </div>
          </div>

          <div class="ores" style="color:${resultColor}">
            ${resultText}
            <span style="color:var(--text3);font-size:11px;margin-left:auto">${fd(op.date)}</span>

            <button
              onclick="editOp('${op.id}')"
              style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;padding:0 4px"
              title="Editar"
            >✏️</button>

            <button
              onclick="askDelOp('${op.id}')"
              style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0 4px"
              title="Borrar"
            >🗑</button>
          </div>

          ${op.learn ? `<div class="olearn">"${e(op.learn)}"</div>` : ""}
        </div>
      `;
    }).join("");
  }

  function resetOpForm() {
    editingOpId = null;
    cr = null;

    ["oa", "oen", "oex", "oc", "ol"].forEach((id) => {
      if (byId(id)) byId(id).value = "";
    });

    if (byId("ot")) byId("ot").value = "Call";
    if (byId("od")) byId("od").value = new Date().toISOString().split("T")[0];
    if (byId("rw")) byId("rw").className = "rb";
    if (byId("rl")) byId("rl").className = "rb";
    if (byId("op-modal-title")) byId("op-modal-title").textContent = "NUEVA OPERACIÓN";
    if (byId("op-save-btn")) byId("op-save-btn").textContent = "Guardar operación";
  }

  function openAddOp() {
    resetOpForm();
    openModal("m-ao");
  }

  function setR(r) {
    cr = r;
    if (byId("rw")) byId("rw").className = "rb" + (r === "win" ? " rw" : "");
    if (byId("rl")) byId("rl").className = "rb" + (r === "lose" ? " rl" : "");
  }

  function editOp(id) {
    const s = gS();
    if (!s) return;

    const op = (s.ops || []).find((o) => o.id === id);
    if (!op) return;

    editingOpId = id;
    if (byId("oa")) byId("oa").value = op.asset || "";
    if (byId("ot")) byId("ot").value = op.type || "Call";
    if (byId("oen")) byId("oen").value = op.entry || "";
    if (byId("oex")) byId("oex").value = op.exit || "";
    if (byId("oc")) byId("oc").value = op.contracts || "";
    if (byId("od")) byId("od").value = op.date || "";
    if (byId("ol")) byId("ol").value = op.learn || "";

    setR(op.result || "win");

    if (byId("op-modal-title")) byId("op-modal-title").textContent = "EDITAR OPERACIÓN";
    if (byId("op-save-btn")) byId("op-save-btn").textContent = "Actualizar operación";

    openModal("m-ao");
  }

  function addOp() {
    const s = gS();
    if (!s) return;

    const a = (byId("oa")?.value || "").trim();
    if (!a || !cr) return;

    const opData = {
      asset: a,
      type: byId("ot")?.value || "Call",
      entry: (byId("oen")?.value || "").trim(),
      exit: (byId("oex")?.value || "").trim(),
      contracts: (byId("oc")?.value || "").trim(),
      date: byId("od")?.value || "",
      result: cr,
      learn: (byId("ol")?.value || "").trim()
    };

    s.ops = Array.isArray(s.ops) ? s.ops : [];

    if (editingOpId) {
      const idx = s.ops.findIndex((o) => o.id === editingOpId);
      if (idx !== -1) {
        s.ops[idx] = { ...s.ops[idx], ...opData };
      }
    } else {
      s.ops.unshift({ id: uid(), ...opData });
    }

    sv();
    closeModal("m-ao");
    resetOpForm();
    rStats();
    renderOps();
    rstrat();
  }

  function askDelOp(id) {
    opConf("🗑", "Eliminar operación", "¿Eliminar esta operación?", () => {
      const s = gS();
      if (!s) return;

      s.ops = (s.ops || []).filter((o) => o.id !== id);
      if (editingOpId === id) editingOpId = null;

      sv();
      rStats();
      renderOps();
      rstrat();
    });
  }

  function expCSV() {
    const s = gS();
    if (!s) return;

    const escCsv = (v) => `"${String(v || "").replace(/"/g, '""')}"`;

    const rows = ["Activo,Tipo,Entrada,Salida,Contratos,Fecha,Resultado,Aprendizaje"];
    (s.ops || []).forEach((o) => {
      rows.push([
        escCsv(o.asset),
        escCsv(o.type),
        escCsv(o.entry),
        escCsv(o.exit),
        escCsv(o.contracts),
        escCsv(o.date),
        escCsv(o.result === "win" ? "Ganó" : "Perdió"),
        escCsv(o.learn || "")
      ].join(","));
    });

    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(rows.join("\n"));
    a.download = "ENFO_" + s.name + ".csv";
    a.click();
  }

  function saveDiary() {
    const t = (byId("dinp")?.value || "").trim();
    if (!t) return;

    D.diary.unshift({
      id: uid(),
      date: new Date().toISOString(),
      text: t
    });

    sv();
    if (byId("dinp")) byId("dinp").value = "";
    rdiary();
  }

  function rdiary() {
    const l = byId("diary-list");
    if (!l) return;

    if (!D.diary.length) {
      l.innerHTML = "";
      return;
    }

    l.innerHTML = D.diary.map((en, i) => `
      <div class="dentry" style="animation-delay:${i * 0.04}s">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="ddate">${ff(en.date)}</div>
          <button
            onclick="askDelDiary('${en.id}')"
            style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px"
          >🗑</button>
        </div>
        <div style="font-size:14px;line-height:1.6;color:var(--text2);white-space:pre-wrap">
          ${e(en.text)}
        </div>
      </div>
    `).join("");
  }

  function askDelDiary(id) {
    opConf("🗑", "Eliminar entrada", "¿Eliminar esta entrada del diario?", () => {
      D.diary = D.diary.filter((en) => en.id !== id);
      sv();
      rdiary();
    });
  }

  function addQ() {
    const t = (byId("qt")?.value || "").trim();
    if (!t) return;

    D.quotes.unshift({
      id: uid(),
      text: t,
      book: (byId("qb")?.value || "").trim(),
      author: (byId("qa")?.value || "").trim()
    });

    sv();
    closeModal("m-aq");

    ["qt", "qb", "qa"].forEach((id) => {
      if (byId(id)) byId(id).value = "";
    });

    rquotes();
  }

  function rquotes() {
    const l = byId("quotes-list");
    if (!l) return;

    if (!D.quotes.length) {
      l.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📚</div>
          <div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px">
            Tu biblioteca está vacía.
          </div>
          <div style="font-size:13px">Añade frases que te inspiren.</div>
        </div>
      `;
      return;
    }

    l.innerHTML = D.quotes.map((q, i) => `
      <div class="qcard" style="animation-delay:${i * 0.04}s">
        <button class="qdel" onclick="askDelQ('${q.id}')">×</button>
        <div style="font-size:14px;line-height:1.6;font-style:italic;margin-bottom:6px">
          "${e(q.text)}"
        </div>
        ${
          q.book || q.author
            ? `<div style="font-size:11px;color:var(--text3);font-weight:600">
                ${q.book ? "📖 " + e(q.book) + " " : ""}
                ${q.author ? "· " + e(q.author) : ""}
              </div>`
            : ""
        }
      </div>
    `).join("");
  }

  function askDelQ(id) {
    opConf("×", "Eliminar cita", "¿Eliminar esta cita de tu biblioteca?", () => {
      D.quotes = D.quotes.filter((q) => q.id !== id);
      sv();
      rquotes();
    });
  }

  function openModal(id) {
    const el = byId(id);
    if (el) el.classList.add("open");
  }

  function closeModal(id) {
    const el = byId(id);
    if (el) el.classList.remove("open");
  }

  function bgc(ev, id) {
    if (ev.target.id === id) {
      closeModal(id);
      if (id === "m-ao") resetOpForm();
    }
  }

  function opConf(icon, title, msg, cb) {
    if (byId("ci")) byId("ci").textContent = icon;
    if (byId("ct")) byId("ct").textContent = title;
    if (byId("cm")) byId("cm").textContent = msg;
    cfcb = cb;
    if (byId("confirm")) byId("confirm").classList.add("open");
  }

  function clsConf() {
    if (byId("confirm")) byId("confirm").classList.remove("open");
  }

  function doConf() {
    const cb = cfcb;
    cfcb = null;
    clsConf();
    if (typeof cb === "function") cb();
  }

  function fd(s) {
    if (!s) return "";
    const parts = s.split("-");
    if (parts.length !== 3) return s;
    return parts[2] + "/" + parts[1] + "/" + parts[0];
  }

  function ff(iso) {
    const d = new Date(iso);
    if (isNaN(d.getTime())) return "";

    const dn = ["DOM", "LUN", "MAR", "MIÉ", "JUE", "VIE", "SÁB"];
    const mn = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];

    return (
      dn[d.getDay()] + " " +
      d.getDate() + " " +
      mn[d.getMonth()] + " · " +
      String(d.getHours()).padStart(2, "0") + ":" +
      String(d.getMinutes()).padStart(2, "0")
    );
  }

  ld();
  setDates();
  initI();
  rstrat();
  rdiary();
  rquotes();
</script>
