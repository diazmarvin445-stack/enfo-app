<script>
  let D = {
    inicio: { thought: "", notes: "", learn: "" },
    strategies: [],
    diary: [],
    quotes: []
  };

  let cur = null;
  let cf = "all";
  let cr = null;
  let cfcb = null;
  let editingOpId = null;

  function sv() {
    try {
      localStorage.setItem("enfo", JSON.stringify(D));
    } catch (e) {}
  }

  function ld() {
    try {
      const r = localStorage.getItem("enfo");
      if (r) D = JSON.parse(r);
    } catch (e) {}

    D.inicio = D.inicio || {};
    D.strategies = D.strategies || [];
    D.diary = D.diary || [];
    D.quotes = D.quotes || [];

    D.strategies.forEach((s) => {
      s.ops = s.ops || [];
      s.rules = s.rules || "";
      s.mesa = s.mesa || "";
    });
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
  }

  function e(s) {
    return String(s || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;");
  }

  function nav(id) {
    document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
    document.querySelectorAll(".nb").forEach((b) => b.classList.remove("on"));

    document.getElementById("s-" + id).classList.add("active");
    document.getElementById("nb-" + id).classList.add("on");
    document.getElementById("strat-detail").classList.remove("open");

    if (id === "estrategias") rstrat();
    if (id === "diario") rdiary();
    if (id === "biblioteca") rquotes();
  }

  function setDates() {
    const d = new Date();
    const dn = ["DOMINGO", "LUNES", "MARTES", "MIÉRCOLES", "JUEVES", "VIERNES", "SÁBADO"];
    const mn = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];
    const mn2 = [
      "ENERO",
      "FEBRERO",
      "MARZO",
      "ABRIL",
      "MAYO",
      "JUNIO",
      "JULIO",
      "AGOSTO",
      "SEPTIEMBRE",
      "OCTUBRE",
      "NOVIEMBRE",
      "DICIEMBRE"
    ];

    document.getElementById("date-lbl").textContent =
      `${dn[d.getDay()]}, ${d.getDate()} ${mn[d.getMonth()]}`;

    document.getElementById("dlbl").textContent =
      `${dn[d.getDay()]}, ${d.getDate()} DE ${mn2[d.getMonth()]} DE ${d.getFullYear()}`;

    const od = document.getElementById("od");
    if (od && !od.value) od.value = d.toISOString().split("T")[0];
  }

  function initI() {
    const g = (id) => document.getElementById(id);

    g("thought").value = D.inicio.thought || "";
    g("notes").value = D.inicio.notes || "";
    g("learn").value = D.inicio.learn || "";

    g("thought").oninput = () => {
      D.inicio.thought = g("thought").value;
      sv();
    };

    g("notes").oninput = () => {
      D.inicio.notes = g("notes").value;
      sv();
    };

    g("learn").oninput = () => {
      D.inicio.learn = g("learn").value;
      sv();
    };
  }

  function rstrat() {
    const l = document.getElementById("strat-list");

    if (!D.strategies.length) {
      l.innerHTML = `
        <div class="empty">
          <div class="empty-icon">⊞</div>
          <div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px">
            No tienes estrategias aún.
          </div>
          <div style="font-size:13px">Crea tu primera estrategia abajo.</div>
        </div>
      `;
      return;
    }

    l.innerHTML = D.strategies
      .map((s, i) => {
        const w = (s.ops || []).filter((o) => o.result === "win").length;
        const t = (s.ops || []).length;

        return `
          <div class="si" style="animation-delay:${i * 0.05}s" onclick="openS('${s.id}')">
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:15px">${e(s.name)}</div>
              <div style="font-size:11px;color:var(--text3);margin-top:3px">
                ${t} operacion${t !== 1 ? "es" : ""}
              </div>
            </div>

            <div style="display:flex;gap:7px;align-items:center;flex-shrink:0">
              ${
                t
                  ? `<span class="pw">${w}W</span><span class="pl">${t - w}L</span>`
                  : ""
              }

              <button
                class="btn btn-g btn-sm"
                onclick="event.stopPropagation(); startEditStratFromList('${s.id}')"
                title="Editar"
              >✏️</button>

              <button
                class="btn btn-d btn-sm"
                onclick="event.stopPropagation(); askDelStratById('${s.id}')"
                title="Borrar"
              >🗑</button>

              <span style="color:var(--text3);font-size:22px">›</span>
            </div>
          </div>
        `;
      })
      .join("");
  }

  function crStrat() {
    const n = document.getElementById("ns-n").value.trim();
    if (!n) return;

    D.strategies.unshift({
      id: uid(),
      name: n,
      rules: document.getElementById("ns-r").value,
      mesa: "",
      ops: []
    });

    sv();
    closeModal("m-ns");
    document.getElementById("ns-n").value = "";
    document.getElementById("ns-r").value = "";
    rstrat();
  }

  function gS() {
    return D.strategies.find((s) => s.id === cur);
  }

  function gSById(id) {
    return D.strategies.find((s) => s.id === id);
  }

  function openS(id) {
    cur = id;
    cf = "all";
    cr = null;
    editingOpId = null;

    const s = gS();
    if (!s) return;

    document.getElementById("dname").textContent = s.name;
    document.getElementById("dname").style.display = "";
    document.getElementById("rinp").style.display = "none";
    document.getElementById("st-rules").value = s.rules || "";
    document.getElementById("st-mesa").value = s.mesa || "";
    document.getElementById("df").value = "";
    document.getElementById("dt").value = "";

    document.querySelectorAll(".chip").forEach((c, i) => c.classList.toggle("on", i === 0));

    stab("ops");
    rStats();
    renderOps();
    document.getElementById("strat-detail").classList.add("open");
  }

  function closeDetail() {
    document.getElementById("strat-detail").classList.remove("open");
    rstrat();
  }

  function startRename() {
    const s = gS();
    if (!s) return;

    document.getElementById("dname").style.display = "none";
    const i = document.getElementById("rinp");
    i.style.display = "block";
    i.value = s.name;
    i.focus();
    i.select();
  }

  function saveRename() {
    const s = gS();
    if (!s) return;

    const v = document.getElementById("rinp").value.trim();
    if (v) {
      s.name = v;
      sv();
      document.getElementById("dname").textContent = v;
      rstrat();
    }

    document.getElementById("rinp").style.display = "none";
    document.getElementById("dname").style.display = "";
  }

  function startEditStratFromList(id) {
    openS(id);
    setTimeout(() => startRename(), 60);
  }

  function askDelStrat() {
    const s = gS();
    if (!s) return;

    opConf(
      "⚠️",
      "Eliminar estrategia",
      "Se eliminarán la estrategia y todas sus operaciones. No se puede deshacer.",
      () => {
        D.strategies = D.strategies.filter((x) => x.id !== s.id);
        sv();
        closeDetail();
      }
    );
  }

  function askDelStratById(id) {
    const s = gSById(id);
    if (!s) return;

    opConf(
      "⚠️",
      "Eliminar estrategia",
      `Se eliminará "${s.name}" y todas sus operaciones.`,
      () => {
        D.strategies = D.strategies.filter((x) => x.id !== id);
        if (cur === id) {
          document.getElementById("strat-detail").classList.remove("open");
          cur = null;
        }
        sv();
        rstrat();
      }
    );
  }

  function svRules() {
    const s = gS();
    if (s) {
      s.rules = document.getElementById("st-rules").value;
      sv();
    }
  }

  function svMesa() {
    const s = gS();
    if (s) {
      s.mesa = document.getElementById("st-mesa").value;
      sv();
    }
  }

  function rStats() {
    const s = gS();
    if (!s) return;

    const ops = s.ops || [];
    const t = ops.length;
    const w = ops.filter((o) => o.result === "win").length;
    const l = t - w;
    const pct = t ? Math.round((w / t) * 100) : 0;

    document.getElementById("srow").innerHTML = `
      <div class="sbox">
        <div class="sval" style="color:var(--accent2)">${t}</div>
        <div class="slbl">TOTAL</div>
      </div>
      <div class="sbox">
        <div class="sval" style="color:var(--green)">${w}</div>
        <div class="slbl">GANADAS</div>
      </div>
      <div class="sbox">
        <div class="sval" style="color:var(--red)">${l}</div>
        <div class="slbl">PERDIDAS</div>
      </div>
    `;

    document.getElementById("ww").textContent = "Ganadas: " + w;
    document.getElementById("wl").textContent = "Perdidas: " + l;
    document.getElementById("wp").textContent = pct + "%";

    setTimeout(() => {
      document.getElementById("wf").style.width = pct + "%";
    }, 80);
  }

  function stab(t) {
    ["ops", "rules", "mesa"].forEach((id) => {
      document.getElementById("tc-" + id).style.display = id === t ? "block" : "none";
      document.getElementById("t-" + id).classList.toggle("on", id === t);
    });
  }

  function setF(f, el) {
    cf = f;
    document.querySelectorAll(".chip").forEach((c) => c.classList.remove("on"));
    el.classList.add("on");
    renderOps();
  }

  function clrDates() {
    document.getElementById("df").value = "";
    document.getElementById("dt").value = "";
    renderOps();
  }

  function renderOps() {
    const s = gS();
    if (!s) return;

    let ops = [...(s.ops || [])];

    if (cf === "win") ops = ops.filter((o) => o.result === "win");
    else if (cf === "lose") ops = ops.filter((o) => o.result === "lose");
    else if (cf === "call") ops = ops.filter((o) => o.type === "Call");
    else if (cf === "put") ops = ops.filter((o) => o.type === "Put");

    const df = document.getElementById("df").value;
    const dt = document.getElementById("dt").value;

    if (df) ops = ops.filter((o) => o.date >= df);
    if (dt) ops = ops.filter((o) => o.date <= dt);

    const l = document.getElementById("ops-list");

    if (!ops.length) {
      l.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📋</div>
          <div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px">
            Sin operaciones
          </div>
          <div style="font-size:13px">Registra tu primera operación.</div>
        </div>
      `;
      return;
    }

    l.innerHTML = ops
      .map((op, i) => {
        const resultColor = op.result === "win" ? "var(--green)" : "var(--red)";
        const resultText = op.result === "win" ? "✅ Ganó" : "❌ Perdió";
        const typeClass = op.type === "Call" ? "call" : "put";
        const typeIcon = op.type === "Call" ? "📈" : "📉";

        return `
          <div class="opc" style="animation-delay:${i * 0.04}s">
            <div class="otop">
              <span class="oasset">${e(op.asset)}</span>
              <span class="otype ${typeClass}">${typeIcon} ${e(op.type)}</span>
            </div>

            <div class="ogrid">
              <div>
                <div style="font-size:10px;color:var(--text3);margin-bottom:2px">ENTRADA</div>
                <div style="font-size:13px;font-weight:600">${e(op.entry) || "—"}</div>
              </div>
              <div>
                <div style="font-size:10px;color:var(--text3);margin-bottom:2px">SALIDA</div>
                <div style="font-size:13px;font-weight:600">${e(op.exit) || "—"}</div>
              </div>
              <div>
                <div style="font-size:10px;color:var(--text3);margin-bottom:2px">CONTRATOS</div>
                <div style="font-size:13px;font-weight:600">${e(op.contracts) || "—"}</div>
              </div>
            </div>

            <div class="ores" style="color:${resultColor}">
              ${resultText}
              <span style="color:var(--text3);font-size:11px;margin-left:auto">${fd(op.date)}</span>

              <button
                onclick="editOp('${op.id}')"
                style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:15px;padding:0 4px"
                title="Editar"
              >
                ✏️
              </button>

              <button
                onclick="askDelOp('${op.id}')"
                style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px;padding:0 4px"
                title="Borrar"
              >
                🗑
              </button>
            </div>

            ${op.learn ? `<div class="olearn">"${e(op.learn)}"</div>` : ""}
          </div>
        `;
      })
      .join("");
  }

  function resetOpForm() {
    editingOpId = null;
    cr = null;
    ["oa", "oen", "oex", "oc", "ol"].forEach((id) => (document.getElementById(id).value = ""));
    document.getElementById("ot").value = "Call";
    document.getElementById("od").value = new Date().toISOString().split("T")[0];
    document.getElementById("rw").className = "rb";
    document.getElementById("rl").className = "rb";

    const title = document.getElementById("op-modal-title");
    const btn = document.getElementById("op-save-btn");
    if (title) title.textContent = "NUEVA OPERACIÓN";
    if (btn) btn.textContent = "Guardar operación";
  }

  function openAddOp() {
    resetOpForm();
    openModal("m-ao");
  }

  function setR(r) {
    cr = r;
    document.getElementById("rw").className = "rb" + (r === "win" ? " rw" : "");
    document.getElementById("rl").className = "rb" + (r === "lose" ? " rl" : "");
  }

  function editOp(id) {
    const s = gS();
    if (!s) return;

    const op = (s.ops || []).find((o) => o.id === id);
    if (!op) return;

    editingOpId = id;
    document.getElementById("oa").value = op.asset || "";
    document.getElementById("ot").value = op.type || "Call";
    document.getElementById("oen").value = op.entry || "";
    document.getElementById("oex").value = op.exit || "";
    document.getElementById("oc").value = op.contracts || "";
    document.getElementById("od").value = op.date || "";
    document.getElementById("ol").value = op.learn || "";
    setR(op.result || "win");

    const title = document.getElementById("op-modal-title");
    const btn = document.getElementById("op-save-btn");
    if (title) title.textContent = "EDITAR OPERACIÓN";
    if (btn) btn.textContent = "Actualizar operación";

    openModal("m-ao");
  }

  function addOp() {
    const s = gS();
    if (!s) return;

    const a = document.getElementById("oa").value.trim();
    if (!a || !cr) return;

    const opData = {
      asset: a,
      type: document.getElementById("ot").value,
      entry: document.getElementById("oen").value.trim(),
      exit: document.getElementById("oex").value.trim(),
      contracts: document.getElementById("oc").value.trim(),
      date: document.getElementById("od").value,
      result: cr,
      learn: document.getElementById("ol").value.trim()
    };

    s.ops = s.ops || [];

    if (editingOpId) {
      const idx = s.ops.findIndex((o) => o.id === editingOpId);
      if (idx !== -1) {
        s.ops[idx] = {
          ...s.ops[idx],
          ...opData
        };
      }
    } else {
      s.ops.unshift({
        id: uid(),
        ...opData
      });
    }

    sv();
    closeModal("m-ao");
    resetOpForm();
    rStats();
    renderOps();
    rstrat();
  }

  function askDelOp(id) {
    opConf("🗑", "Eliminar operación", "¿Eliminar esta operación?", () => {
      const s = gS();
      if (!s) return;

      s.ops = (s.ops || []).filter((o) => o.id !== id);
      if (editingOpId === id) editingOpId = null;

      sv();
      rStats();
      renderOps();
      rstrat();
    });
  }

  function expCSV() {
    const s = gS();
    if (!s) return;

    const escCsv = (v) => {
      const str = String(v || "");
      return `"${str.replace(/"/g, '""')}"`;
    };

    const rows = ["Activo,Tipo,Entrada,Salida,Contratos,Fecha,Resultado,Aprendizaje"];
    (s.ops || []).forEach((o) => {
      rows.push(
        [
          escCsv(o.asset),
          escCsv(o.type),
          escCsv(o.entry),
          escCsv(o.exit),
          escCsv(o.contracts),
          escCsv(o.date),
          escCsv(o.result === "win" ? "Ganó" : "Perdió"),
          escCsv(o.learn || "")
        ].join(",")
      );
    });

    const a = document.createElement("a");
    a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(rows.join("\n"));
    a.download = "ENFO_" + s.name + ".csv";
    a.click();
  }

  function saveDiary() {
    const t = document.getElementById("dinp").value.trim();
    if (!t) return;

    D.diary.unshift({
      id: uid(),
      date: new Date().toISOString(),
      text: t
    });

    sv();
    document.getElementById("dinp").value = "";
    rdiary();
  }

  function rdiary() {
    const l = document.getElementById("diary-list");
    if (!D.diary.length) {
      l.innerHTML = "";
      return;
    }

    l.innerHTML = D.diary
      .map(
        (en, i) => `
        <div class="dentry" style="animation-delay:${i * 0.04}s">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="ddate">${ff(en.date)}</div>
            <button
              onclick="askDelDiary('${en.id}')"
              style="background:none;border:none;color:var(--text3);cursor:pointer;font-size:15px"
            >
              🗑
            </button>
          </div>
          <div style="font-size:14px;line-height:1.6;color:var(--text2);white-space:pre-wrap">
            ${e(en.text)}
          </div>
        </div>
      `
      )
      .join("");
  }

  function askDelDiary(id) {
    opConf("🗑", "Eliminar entrada", "¿Eliminar esta entrada del diario?", () => {
      D.diary = D.diary.filter((en) => en.id !== id);
      sv();
      rdiary();
    });
  }

  function addQ() {
    const t = document.getElementById("qt").value.trim();
    if (!t) return;

    D.quotes.unshift({
      id: uid(),
      text: t,
      book: document.getElementById("qb").value.trim(),
      author: document.getElementById("qa").value.trim()
    });

    sv();
    closeModal("m-aq");
    ["qt", "qb", "qa"].forEach((id) => (document.getElementById(id).value = ""));
    rquotes();
  }

  function rquotes() {
    const l = document.getElementById("quotes-list");

    if (!D.quotes.length) {
      l.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📚</div>
          <div style="font-size:15px;font-weight:600;color:var(--text2);margin-bottom:6px">
            Tu biblioteca está vacía.
          </div>
          <div style="font-size:13px">Añade frases que te inspiren.</div>
        </div>
      `;
      return;
    }

    l.innerHTML = D.quotes
      .map(
        (q, i) => `
        <div class="qcard" style="animation-delay:${i * 0.04}s">
          <button class="qdel" onclick="askDelQ('${q.id}')">×</button>
          <div style="font-size:14px;line-height:1.6;font-style:italic;margin-bottom:6px">
            "${e(q.text)}"
          </div>
          ${
            q.book || q.author
              ? `<div style="font-size:11px;color:var(--text3);font-weight:600">
                  ${q.book ? "📖 " + e(q.book) + " " : ""}
                  ${q.author ? "· " + e(q.author) : ""}
                </div>`
              : ""
          }
        </div>
      `
      )
      .join("");
  }

  function askDelQ(id) {
    opConf("×", "Eliminar cita", "¿Eliminar esta cita de tu biblioteca?", () => {
      D.quotes = D.quotes.filter((q) => q.id !== id);
      sv();
      rquotes();
    });
  }

  function openModal(id) {
    document.getElementById(id).classList.add("open");
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove("open");
  }

  function bgc(ev, id) {
    if (ev.target.id === id) {
      closeModal(id);
      if (id === "m-ao") resetOpForm();
    }
  }

  function opConf(icon, title, msg, cb) {
    document.getElementById("ci").textContent = icon;
    document.getElementById("ct").textContent = title;
    document.getElementById("cm").textContent = msg;
    cfcb = cb;
    document.getElementById("confirm").classList.add("open");
  }

  function clsConf() {
    document.getElementById("confirm").classList.remove("open");
  }

  function doConf() {
    const cb = cfcb;
    cfcb = null;
    clsConf();
    if (typeof cb === "function") cb();
  }

  function fd(s) {
    if (!s) return "";
    const [y, m, d] = s.split("-");
    return d + "/" + m + "/" + y;
  }

  function ff(iso) {
    const d = new Date(iso);
    const dn = ["DOM", "LUN", "MAR", "MIÉ", "JUE", "VIE", "SÁB"];
    const mn = ["ENE", "FEB", "MAR", "ABR", "MAY", "JUN", "JUL", "AGO", "SEP", "OCT", "NOV", "DIC"];

    return (
      dn[d.getDay()] +
      " " +
      d.getDate() +
      " " +
      mn[d.getMonth()] +
      " · " +
      String(d.getHours()).padStart(2, "0") +
      ":" +
      String(d.getMinutes()).padStart(2, "0")
    );
  }

  ld();
  setDates();
  initI();
</script>
